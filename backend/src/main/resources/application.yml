spring:
  application:
    name: shopping-system
  profiles:
    default: dev

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  jwt:
    secret: ${APP_JWT_SECRET:shopping-system-demo-secret-key-please-change}
    expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:120}
  seckill:
    rate-limit:
      window-seconds: 5
      max-requests: 5
