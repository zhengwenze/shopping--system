services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: seckill
    volumes:
      - mysql_local_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "${RABBITMQ_UI_PORT:-15673}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend-dev:
    image: maven:3.9.0-eclipse-temurin-17
    working_dir: /app
    command: sh -c "./mvnw -Dmaven.test.skip=true -Dspring-boot.run.useTestClasspath=false -Dspring-boot.run.profiles=docker spring-boot:run"
    environment:
      MAVEN_OPTS: -Xmx768m
    volumes:
      - ./backend:/app
      - maven_local_cache:/root/.m2
    ports:
      - "${BACKEND_DEV_PORT:-8081}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend-dev:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "if [ ! -x node_modules/.bin/vite ]; then npm ci --no-audit --no-fund; fi && npm run dev -- --host 0.0.0.0 --port 3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_PROXY_TARGET: http://backend-dev:8080
    volumes:
      - ./frontend:/app
      - frontend_local_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_DEV_PORT:-3001}:3000"
    depends_on:
      backend-dev:
        condition: service_started

volumes:
  mysql_local_data:
  maven_local_cache:
  frontend_local_node_modules:
